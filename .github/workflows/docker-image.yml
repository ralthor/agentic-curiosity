name: Docker Image CI

on:
  push:
    branches: ["master"]

env:
  IMAGE_NAME: agentic-curiosity

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-web:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Deploy web on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -eu
            DEPLOY_DIR='${{ secrets.VPS_DEPLOY_PATH }}'
            if [ -z "$DEPLOY_DIR" ]; then
              echo "VPS_DEPLOY_PATH is not set." >&2
              exit 1
            fi
            cd "$DEPLOY_DIR"

            if docker info >/dev/null 2>&1; then
              RUN_DOCKER() { docker "$@"; }
            elif sudo -n docker info >/dev/null 2>&1; then
              RUN_DOCKER() { sudo -n docker "$@"; }
            else
              echo "Docker requires either direct access or passwordless sudo for the SSH user." >&2
              exit 1
            fi

            if ! RUN_DOCKER compose version >/dev/null 2>&1; then
              echo "Modern Docker Compose ('docker compose') is required on the server." >&2
              exit 1
            fi

            RUN_DOCKER compose up -d --pull always web
            RUN_DOCKER compose ps web
